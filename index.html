<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBITAL VIZ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000308;color:#c8ddf0;font-family:'JetBrains Mono','Fira Code',monospace;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;position:absolute;inset:0;width:100%;height:100%}
#ui{position:absolute;inset:0;pointer-events:none}
.panel{position:absolute;background:rgba(4,12,28,.9);border:1px solid rgba(0,180,255,.18);border-radius:6px;backdrop-filter:blur(14px);pointer-events:all}
#topbar{top:14px;left:50%;transform:translateX(-50%);padding:9px 22px;display:flex;align-items:center;gap:18px;white-space:nowrap}
.logo{font-size:15px;font-weight:700;letter-spacing:.2em;color:#00e5ff}
.sep{width:1px;height:16px;background:rgba(0,180,255,.2)}
#clock{font-size:11px;color:#5a7a96}
#clock b{color:#00e5ff;font-weight:400}
#statpanel{top:14px;left:14px;width:265px;padding:14px}
.ptitle{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#5a7a96;margin-bottom:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.sc{background:rgba(8,22,50,.8);border:1px solid rgba(0,180,255,.1);border-radius:4px;padding:9px 11px}
.sv{font-size:22px;font-weight:700;color:#eaf7ff;line-height:1}
.sl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#5a7a96;margin-top:3px}
.legend{display:flex;flex-direction:column;gap:5px}
.li{display:flex;align-items:center;gap:8px;font-size:11px;cursor:pointer;padding:4px 5px;border-radius:4px;border:1px solid transparent;transition:.15s;user-select:none}
.li:hover{background:rgba(8,22,50,.8);border-color:rgba(0,180,255,.15)}
.li.off{opacity:.3}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lname{flex:1;color:#c8ddf0}.lcount{font-size:10px;color:#5a7a96}
#detpanel{top:14px;right:14px;width:265px;padding:14px;display:none}
#detpanel.vis{display:block}
#detname{font-size:13px;font-weight:700;color:#eaf7ff;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button.close{position:absolute;top:9px;right:9px;background:none;border:none;color:#5a7a96;font-size:15px;cursor:pointer;padding:3px 7px;border-radius:3px;font-family:inherit}
button.close:hover{color:#eaf7ff;background:rgba(8,22,50,.8)}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin:8px 0}
.kv dt{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:#5a7a96;align-self:center}
.kv dd{font-size:11px;color:#eaf7ff;text-align:right}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.bp{background:rgba(0,229,255,.12);color:#00e5ff;border:1px solid rgba(0,229,255,.35)}
.br{background:rgba(255,149,0,.12);color:#ff9500;border:1px solid rgba(255,149,0,.35)}
.bd{background:rgba(255,61,61,.12);color:#ff3d3d;border:1px solid rgba(255,61,61,.35)}
.bu{background:rgba(136,136,136,.12);color:#888;border:1px solid rgba(136,136,136,.3)}
#cbar{bottom:18px;left:50%;transform:translateX(-50%);padding:9px 16px;display:flex;align-items:center;gap:12px;white-space:nowrap}
.cg{display:flex;align-items:center;gap:7px}
.cl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#5a7a96}
input[type=range]{-webkit-appearance:none;width:90px;height:3px;background:rgba(0,180,255,.2);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#00e5ff;cursor:pointer}
#tdisp{font-size:11px;color:#00e5ff;min-width:42px}
.cdiv{width:1px;height:18px;background:rgba(0,180,255,.15)}
.ibtn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:rgba(8,22,50,.8);border:1px solid rgba(0,180,255,.15);border-radius:4px;color:#5a7a96;cursor:pointer;font-size:14px;transition:.15s;font-family:inherit}
.ibtn:hover{border-color:rgba(0,229,255,.5);color:#00e5ff}
.ibtn.on{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.08)}
#srchpanel{bottom:18px;left:14px;padding:6px 10px;display:flex;align-items:center;gap:6px}
#sinput{background:none;border:none;outline:none;font-family:inherit;font-size:11px;color:#eaf7ff;width:170px}
#sinput::placeholder{color:#5a7a96}
#slist{position:absolute;bottom:100%;left:0;right:0;margin-bottom:3px;background:rgba(4,12,28,.96);border:1px solid rgba(0,180,255,.18);border-radius:5px;max-height:200px;overflow-y:auto;display:none}
#slist.vis{display:block}
.sri{padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(0,180,255,.06);font-size:11px}
.sri:last-child{border:none}.sri:hover{background:rgba(8,22,50,.9)}
.sn{flex:1;color:#eaf7ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sid{font-size:9px;color:#5a7a96}
#fps{position:absolute;bottom:18px;right:14px;font-size:9px;color:#5a7a96;letter-spacing:.06em}
#loader{position:fixed;inset:0;background:#000308;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:99;transition:opacity .6s}
#loader.out{opacity:0;pointer-events:none}
.llogo{font-size:26px;font-weight:700;letter-spacing:.22em;color:#00e5ff}
.ltrack{width:260px;height:2px;background:rgba(0,180,255,.12);border-radius:1px;overflow:hidden}
.lfill{height:100%;background:#00e5ff;width:0%;transition:width .4s;box-shadow:0 0 10px rgba(0,229,255,.6)}
.lmsg{font-size:10px;color:#5a7a96;letter-spacing:.1em}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,180,255,.2);border-radius:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="panel" id="topbar">
    <span class="logo">ORBITAL VIZ</span>
    <div class="sep"></div>
    <div id="clock">SIM <b id="simclock">--:--:--</b></div>
    <div class="sep"></div>
    <span style="font-size:9px;color:#00e5ff;letter-spacing:.1em" id="satcount">-- OBJ</span>
  </div>
  <div class="panel" id="statpanel">
    <div class="ptitle">Tracked Objects</div>
    <div class="sgrid">
      <div class="sc"><div class="sv" id="stot">--</div><div class="sl">Total</div></div>
      <div class="sc"><div class="sv" id="sdeb" style="color:#ff3d3d">--</div><div class="sl">Debris</div></div>
      <div class="sc"><div class="sv" id="spay" style="color:#00e5ff">--</div><div class="sl">Payloads</div></div>
      <div class="sc"><div class="sv" id="srkt" style="color:#ff9500">--</div><div class="sl">Rocket Bodies</div></div>
    </div>
    <div class="ptitle">Filter</div>
    <div class="legend">
      <div class="li" onclick="toggleType('payload',this)"><span class="dot" style="background:#00e5ff;box-shadow:0 0 4px #00e5ff"></span><span class="lname">Payloads</span><span class="lcount" id="lp">0</span></div>
      <div class="li" onclick="toggleType('rocket_body',this)"><span class="dot" style="background:#ff9500;box-shadow:0 0 4px #ff9500"></span><span class="lname">Rocket Bodies</span><span class="lcount" id="lr">0</span></div>
      <div class="li" onclick="toggleType('debris',this)"><span class="dot" style="background:#ff3d3d;box-shadow:0 0 4px #ff3d3d"></span><span class="lname">Debris</span><span class="lcount" id="ld">0</span></div>
      <div class="li" onclick="toggleType('unknown',this)"><span class="dot" style="background:#555"></span><span class="lname">Unknown</span><span class="lcount" id="lu">0</span></div>
    </div>
  </div>
  <div class="panel" id="detpanel">
    <button class="close" onclick="closeDet()">&#x2715;</button>
    <div class="ptitle">Selected Object</div>
    <div id="detname">--</div>
    <dl class="kv">
      <dt>NORAD</dt><dd id="dn">--</dd>
      <dt>Type</dt><dd id="dt">--</dd>
      <dt>Orbit</dt><dd id="do">--</dd>
      <dt>Altitude</dt><dd id="da">--</dd>
      <dt>Period</dt><dd id="dp">--</dd>
      <dt>Inclination</dt><dd id="di">--</dd>
      <dt>Velocity</dt><dd id="dv">--</dd>
      <dt>Eccentricity</dt><dd id="de">--</dd>
    </dl>
  </div>
  <div class="panel" id="cbar">
    <div class="cg"><span class="cl">Speed</span><input type="range" id="tslider" min="0" max="10" value="0" oninput="setSpeed(+this.value)"><span id="tdisp">1x</span></div>
    <div class="cdiv"></div>
    <div class="cg">
      <button class="ibtn" id="brot" onclick="autoRot=!autoRot;this.classList.toggle('on',autoRot)" title="Auto-rotate">&#x27F3;</button>
      <button class="ibtn" onclick="resetView()" title="Reset">&#x2316;</button>
    </div>
  </div>
  <div class="panel" id="srchpanel">
    <span style="color:#5a7a96;font-size:13px">&#x2315;</span>
    <input id="sinput" type="text" placeholder="Search name or NORAD ID..." autocomplete="off"
      oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape'){this.value='';hideSrch()}">
    <div id="slist"></div>
  </div>
  <div id="fps">-- FPS</div>
</div>
<div id="loader">
  <div class="llogo">ORBITAL VIZ</div>
  <div class="ltrack"><div class="lfill" id="lfill"></div></div>
  <div class="lmsg" id="lmsg">LOADING...</div>
</div>

<script>
(function(){
'use strict';
var sat=window.satellite;
var RE=6378.137,MU=398600.4418,TAU=Math.PI*2,PI=Math.PI;

// Parse TLE text
function parseTLEs(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var objs=[];
  for(var i=0;i<lines.length-2;i++){
    var l1=lines[i+1],l2=lines[i+2];
    if(l1[0]!=='1'||l2[0]!=='2'){continue;}
    var name=lines[i];
    if(name[0]==='1'||name[0]==='2'){continue;}
    try{
      var satrec=sat.twoline2satrec(l1,l2);
      if(!satrec||satrec.error!==0){i+=2;continue;}
      var noradId=parseInt(l1.substring(2,7));
      var n=parseFloat(l2.substring(52,63));
      var period=n>0?1440/n:90;
      var inc=parseFloat(l2.substring(8,16));
      var ecc=parseFloat('0.'+l2.substring(26,33).trim());
      var t=guessType(name);
      objs.push({n:name,t:t,noradId:noradId,satrec:satrec,period:period,inc:inc,ecc:ecc});
    }catch(e){}
    i+=2;
  }
  return objs;
}

function guessType(n){
  var u=n.toUpperCase();
  if(u.indexOf('DEB')>-1||u.indexOf('DEBRIS')>-1)return'debris';
  if(u.indexOf('R/B')>-1||u.indexOf('ROCKET')>-1||u.indexOf('BOOSTER')>-1)return'rocket_body';
  return'payload';
}
function classOrbit(r){var a=r-RE;if(a<2000)return'LEO';if(a<35000)return'MEO';if(a<36500)return'GEO';return'HEO';}

// State
var objects=[],N=0,simTime=Date.now(),speed=1,lastT=performance.now(),earthRot=0,autoRot=false;
var hidden=new Set(),SPEEDS=[1,5,30,120,600,1800,3600,14400,86400,259200,604800];
var TCOD={payload:0,rocket_body:1,debris:2,unknown:3};
var camTh=0.4,camPh=0.22,camD=3.4,dragging=false,mX=0,mY=0,didDrag=false;

// WebGL
var canvas=document.getElementById('c');
var gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
if(!gl){document.getElementById('lmsg').textContent='WebGL not supported';return;}

function mkProg(vs,fs){
  var v=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(v,vs);gl.compileShader(v);
  var f=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(f,fs);gl.compileShader(f);
  var p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);
  return p;
}

// Earth shader — NOTE: uv.x maps longitude (0=left=neg X axis), uv.y maps latitude
// The sphere is built with longitude going 0->2pi as lo goes 0->segs
// Three.js convention: lon=0 at +X, but we need correct orientation
var earthP=mkProg(
  'attribute vec3 p;attribute vec3 nm;attribute vec2 uv;uniform mat4 mvp;uniform mat4 mdl;varying vec3 vn;varying vec2 vt;void main(){vn=normalize(mat3(mdl[0].xyz,mdl[1].xyz,mdl[2].xyz)*nm);vt=uv;gl_Position=mvp*vec4(p,1.);}',
  'precision mediump float;varying vec3 vn;varying vec2 vt;uniform sampler2D tex;uniform int hasTex;uniform vec3 sun;void main(){float d=max(dot(vn,normalize(sun)),0.)+.08;if(hasTex==1){vec4 c=texture2D(tex,vec2(1.-vt.x,1.-vt.y));gl_FragColor=vec4(c.rgb*d,1.);}else{float lat=(1.-vt.y)*3.14159-1.5708;float lon=vt.x*6.28318;float h=sin(lat*4.)*cos(lon*7.)+sin(lat*9.+1.)*cos(lon*13.+2.)*.35;vec3 land=vec3(.12,.28,.14);vec3 sea=vec3(.04,.12,.28);vec3 col=mix(sea,land,smoothstep(0.,.35,h));col=mix(col,vec3(.88,.92,.96),smoothstep(1.1,1.45,abs(lat)));gl_FragColor=vec4(col*d,1.);}}'
);
var atmP=mkProg(
  'attribute vec3 p;attribute vec3 nm;uniform mat4 mvp;varying vec3 vn;void main(){vn=nm;gl_Position=mvp*vec4(p*1.028,1.);}',
  'precision mediump float;varying vec3 vn;uniform vec3 cam;void main(){float r=1.-abs(dot(normalize(vn),normalize(cam)));gl_FragColor=vec4(.1,.32,1.,pow(r,3.)*.55);}'
);
var satP=mkProg(
  'attribute vec3 p;attribute float tp;attribute float sl;uniform mat4 mvp;uniform float sz;varying vec4 vc;varying float vs;void main(){vec4 c;if(tp<.5)c=vec4(0.,.89,1.,1.);else if(tp<1.5)c=vec4(1.,.58,0.,1.);else if(tp<2.5)c=vec4(1.,.24,.24,1.);else c=vec4(.4,.4,.4,1.);vc=c;vs=sl;vec4 mv=mvp*vec4(p,1.);gl_PointSize=clamp(sz*1.5/max(-mv.z,.01),2.,14.);gl_Position=mv;}',
  'precision mediump float;varying vec4 vc;varying float vs;void main(){vec2 uv=gl_PointCoord-.5;if(length(uv)>.5)discard;float a=1.-smoothstep(.3,.5,length(uv));gl_FragColor=vec4(vs>.5?vec3(1.,1.,.2):vc.rgb,a);}'
);
var trailP=mkProg('attribute vec3 p;uniform mat4 mvp;void main(){gl_Position=mvp*vec4(p,1.);}','precision mediump float;void main(){gl_FragColor=vec4(0.,.9,1.,.28);}');
var starP=mkProg('attribute vec3 p;uniform mat4 mvp;void main(){gl_PointSize=1.2;gl_Position=mvp*vec4(p,1.);}','precision mediump float;void main(){gl_FragColor=vec4(1.,1.,1.,.65);}');

// Matrix
function persp(fov,asp,n,f){var t=1/Math.tan(fov/2),r=1/(n-f);return new Float32Array([t/asp,0,0,0,0,t,0,0,0,0,(n+f)*r,-1,0,0,n*f*r*2,0]);}
function mul(a,b){var c=new Float32Array(16);for(var i=0;i<4;i++)for(var j=0;j<4;j++){var s=0;for(var k=0;k<4;k++)s+=a[i+k*4]*b[k+j*4];c[i+j*4]=s;}return c;}
function rotY(a){var c=Math.cos(a),s=Math.sin(a);return new Float32Array([c,0,-s,0,0,1,0,0,s,0,c,0,0,0,0,1]);}
function lookAt(ex,ey,ez){
  var fx=-ex,fy=-ey,fz=-ez,fl=Math.sqrt(fx*fx+fy*fy+fz*fz);fx/=fl;fy/=fl;fz/=fl;
  var rx=fy*0-fz*1,ry=fz*0-fx*0,rz=fx*1-fy*0,rl=Math.sqrt(rx*rx+ry*ry+rz*rz);rx/=rl;ry/=rl;rz/=rl;
  var ux=ry*fz-rz*fy,uy=rz*fx-rx*fz,uz=rx*fy-ry*fx;
  return new Float32Array([rx,ux,-fx,0,ry,uy,-fy,0,rz,uz,-fz,0,-(rx*ex+ry*ey+rz*ez),-(ux*ex+uy*ey+uz*ez),fx*ex+fy*ey+fz*ez,1]);
}

// Sphere (high res)
function mkSphere(r,s){
  var v=[],n=[],u=[],ix=[];
  for(var la=0;la<=s;la++){var th=la*PI/s,st=Math.sin(th),ct=Math.cos(th);
    for(var lo=0;lo<=s;lo++){var ph=lo*TAU/s,sp=Math.sin(ph),cp=Math.cos(ph);v.push(r*st*cp,r*ct,r*st*sp);n.push(st*cp,ct,st*sp);u.push(lo/s,la/s);}}
  for(var la=0;la<s;la++)for(var lo=0;lo<s;lo++){var a=la*(s+1)+lo,b=a+s+1;ix.push(a,b,a+1,b,b+1,a+1);}
  return{v:new Float32Array(v),n:new Float32Array(n),u:new Float32Array(u),i:new Uint16Array(ix)};
}
var sph=mkSphere(1,72);
function vbo(d,dyn){var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,d,dyn?gl.DYNAMIC_DRAW:gl.STATIC_DRAW);return b;}
function ibo(d){var b=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,b);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,d,gl.STATIC_DRAW);return b;}
function attr(p,nm,buf,sz){var l=gl.getAttribLocation(p,nm);if(l<0)return;gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,sz,gl.FLOAT,false,0,0);}
function uni1f(p,n,v){gl.uniform1f(gl.getUniformLocation(p,n),v);}
function uni1i(p,n,v){gl.uniform1i(gl.getUniformLocation(p,n),v);}
function uni3(p,n,x,y,z){gl.uniform3f(gl.getUniformLocation(p,n),x,y,z);}
function uniM(p,n,m){gl.uniformMatrix4fv(gl.getUniformLocation(p,n),false,m);}

var eV=vbo(sph.v),eN=vbo(sph.n),eU=vbo(sph.u),eI=ibo(sph.i);

// Stars
var stN=6000,stBuf=new Float32Array(stN*3);
for(var i=0;i<stN;i++){var x,y,z,r2;do{x=Math.random()*2-1;y=Math.random()*2-1;z=Math.random()*2-1;r2=x*x+y*y+z*z;}while(r2>1||r2<.001);var sc=80/Math.sqrt(r2);stBuf[i*3]=x*sc;stBuf[i*3+1]=y*sc;stBuf[i*3+2]=z*sc;}
var stV=vbo(stBuf);

// Earth texture - try multiple sources
var earthTex=gl.createTexture();
var hasTex=0;
gl.bindTexture(gl.TEXTURE_2D,earthTex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([8,30,60,255]));
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

function loadTex(urls,idx){
  if(idx>=urls.length)return;
  var img=new Image();img.crossOrigin='anonymous';
  img.onload=function(){
    gl.bindTexture(gl.TEXTURE_2D,earthTex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    hasTex=1;
  };
  img.onerror=function(){loadTex(urls,idx+1);};
  img.src=urls[idx];
}
loadTex([
  'https://raw.githubusercontent.com/mrdoob/three.js/r134/examples/textures/planets/earth_atmos_2048.jpg',
  'https://eoimages.gsfc.nasa.gov/images/imagerecords/74000/74518/world.200412.3x2048x1024.jpg'
],0);

// Satellite buffers
var MAX=8000;
var sPos=new Float32Array(MAX*3),sTp=new Float32Array(MAX),sSl=new Float32Array(MAX);
var sPB=vbo(sPos,true),sTB=vbo(sTp,true),sSB=vbo(sSl,true);

// Trail
var trlB=null,trlN=0;
function setTrail(pts){
  if(trlB){gl.deleteBuffer(trlB);trlB=null;trlN=0;}
  if(!pts||pts.length<2)return;
  var d=new Float32Array(pts.length*3);
  for(var i=0;i<pts.length;i++){d[i*3]=pts[i][0];d[i*3+1]=pts[i][1];d[i*3+2]=pts[i][2];}
  trlB=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,trlB);gl.bufferData(gl.ARRAY_BUFFER,d,gl.DYNAMIC_DRAW);trlN=pts.length;
}

// Input
canvas.addEventListener('mousedown',function(e){dragging=true;mX=e.clientX;mY=e.clientY;didDrag=false;});
window.addEventListener('mouseup',function(e){if(!didDrag)pick(e);dragging=false;});
window.addEventListener('mousemove',function(e){if(!dragging)return;var dx=e.clientX-mX,dy=e.clientY-mY;if(Math.abs(dx)+Math.abs(dy)>2)didDrag=true;camTh-=dx*.005;camPh-=dy*.005;camPh=Math.max(-1.48,Math.min(1.48,camPh));mX=e.clientX;mY=e.clientY;});
canvas.addEventListener('wheel',function(e){e.preventDefault();camD*=1+e.deltaY*.001;camD=Math.max(1.1,Math.min(50,camD));},{passive:false});
var lpin=0;
canvas.addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1){dragging=true;mX=e.touches[0].clientX;mY=e.touches[0].clientY;didDrag=false;}else{dragging=false;lpin=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1&&dragging){var dx=e.touches[0].clientX-mX,dy=e.touches[0].clientY-mY;if(Math.abs(dx)+Math.abs(dy)>2)didDrag=true;camTh-=dx*.005;camPh-=dy*.005;camPh=Math.max(-1.48,Math.min(1.48,camPh));mX=e.touches[0].clientX;mY=e.touches[0].clientY;}else if(e.touches.length===2){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);camD*=lpin/d;camD=Math.max(1.1,Math.min(50,camD));lpin=d;}},{passive:false});
canvas.addEventListener('touchend',function(){dragging=false;},{passive:false});

window.resetView=function(){camTh=0.4;camPh=0.22;camD=3.4;};
window.setSpeed=function(v){speed=SPEEDS[+v]||1;var s=speed;document.getElementById('tdisp').textContent=s>=86400?(s/86400|0)+'dx':s>=3600?(s/3600|0)+'hx':s>=60?(s/60|0)+'mx':s+'x';};
window.toggleType=function(t,el){hidden.has(t)?hidden.delete(t):hidden.add(t);el.classList.toggle('off',hidden.has(t));};
window.closeDet=function(){document.getElementById('detpanel').classList.remove('vis');sSl.fill(0);gl.bindBuffer(gl.ARRAY_BUFFER,sSB);gl.bufferSubData(gl.ARRAY_BUFFER,0,sSl.subarray(0,N));setTrail(null);};

function getMats(){
  var W=canvas.width,H=canvas.height;
  var cx=camD*Math.cos(camPh)*Math.sin(camTh),cy=camD*Math.sin(camPh),cz=camD*Math.cos(camPh)*Math.cos(camTh);
  return{mvp:mul(persp(PI/4,W/H,.01,200),lookAt(cx,cy,cz)),cx:cx,cy:cy,cz:cz};
}

var tick=0;
function updSats(){
  var now=new Date(simTime);
  for(var i=0;i<N;i++){
    if(hidden.has(objects[i].t)){sPos[i*3]=0;sPos[i*3+1]=0;sPos[i*3+2]=0;sTp[i]=TCOD[objects[i].t]||3;continue;}
    try{
      var pv=sat.propagate(objects[i].satrec,now);
      if(pv&&pv.position){sPos[i*3]=pv.position.x/RE;sPos[i*3+1]=pv.position.z/RE;sPos[i*3+2]=-pv.position.y/RE;}
      else{sPos[i*3]=0;sPos[i*3+1]=0;sPos[i*3+2]=0;}
    }catch(e){sPos[i*3]=0;sPos[i*3+1]=0;sPos[i*3+2]=0;}
    sTp[i]=TCOD[objects[i].t]||3;
  }
  gl.bindBuffer(gl.ARRAY_BUFFER,sPB);gl.bufferSubData(gl.ARRAY_BUFFER,0,sPos.subarray(0,N*3));
  gl.bindBuffer(gl.ARRAY_BUFFER,sTB);gl.bufferSubData(gl.ARRAY_BUFFER,0,sTp.subarray(0,N));
  gl.bindBuffer(gl.ARRAY_BUFFER,sSB);gl.bufferSubData(gl.ARRAY_BUFFER,0,sSl.subarray(0,N));
}

function pick(e){
  var rect=canvas.getBoundingClientRect();
  var mx=(e.clientX-rect.left)/rect.width*2-1,my=-((e.clientY-rect.top)/rect.height*2-1);
  var m=getMats(),best=-1,bestD=0.05;
  for(var i=0;i<N;i++){
    if(hidden.has(objects[i].t))continue;
    var v=[sPos[i*3],sPos[i*3+1],sPos[i*3+2],1],clip=[0,0,0,0];
    for(var r=0;r<4;r++)for(var c=0;c<4;c++)clip[r]+=m.mvp[r+c*4]*v[c];
    if(clip[3]<=0)continue;
    var d=Math.sqrt(Math.pow(clip[0]/clip[3]-mx,2)+Math.pow(clip[1]/clip[3]-my,2));
    if(d<bestD){bestD=d;best=i;}
  }
  if(best<0){window.closeDet();return;}
  selSat(best);
}

function selSat(i){
  var obj=objects[i],alt='--',vel='--',orb='--';
  try{
    var pv=sat.propagate(obj.satrec,new Date(simTime));
    if(pv&&pv.position){
      var p=pv.position,r=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z);
      alt=Math.round(r-RE)+' km';vel=(Math.sqrt(MU/r)).toFixed(2)+' km/s';orb=classOrbit(r);
      var steps=90,dt2=obj.period*60/steps*1000,trail=[];
      for(var j=0;j<=steps;j++){try{var pp=sat.propagate(obj.satrec,new Date(simTime+j*dt2));if(pp&&pp.position)trail.push([pp.position.x/RE,pp.position.z/RE,-pp.position.y/RE]);}catch(e){}}
      setTrail(trail);
    }
  }catch(e){setTrail(null);}
  sSl.fill(0);sSl[i]=1;gl.bindBuffer(gl.ARRAY_BUFFER,sSB);gl.bufferSubData(gl.ARRAY_BUFFER,0,sSl.subarray(0,N));
  document.getElementById('detname').textContent=obj.n;
  document.getElementById('dn').textContent=obj.noradId;
  var bc={payload:'bp',rocket_body:'br',debris:'bd',unknown:'bu'}[obj.t]||'bu';
  document.getElementById('dt').innerHTML='<span class="badge '+bc+'">'+obj.t.replace('_',' ')+'</span>';
  document.getElementById('do').textContent=orb;document.getElementById('da').textContent=alt;
  document.getElementById('dp').textContent=obj.period.toFixed(1)+' min';document.getElementById('di').textContent=obj.inc.toFixed(2)+'deg';
  document.getElementById('dv').textContent=vel;document.getElementById('de').textContent=obj.ecc.toFixed(6);
  document.getElementById('detpanel').classList.add('vis');
}

// Search
var sT;
window.doSearch=function(v){
  clearTimeout(sT);var sl=document.getElementById('slist');
  if(!v.trim()){sl.classList.remove('vis');return;}
  sT=setTimeout(function(){
    var q=v.toLowerCase(),cc={payload:'#00e5ff',rocket_body:'#ff9500',debris:'#ff3d3d',unknown:'#555'};
    var m=objects.filter(function(o){return o.n.toLowerCase().indexOf(q)>-1||String(o.noradId).indexOf(q)>-1;}).slice(0,12);
    if(!m.length){sl.classList.remove('vis');return;}
    sl.innerHTML=m.map(function(o){return'<div class="sri" onclick="pickSrch('+objects.indexOf(o)+')"><span class="dot" style="background:'+cc[o.t]+'"></span><span class="sn">'+o.n+'</span><span class="sid">'+o.noradId+'</span></div>';}).join('');
    sl.classList.add('vis');
  },150);
};
window.hideSrch=function(){document.getElementById('slist').classList.remove('vis');};
window.pickSrch=function(i){window.hideSrch();document.getElementById('sinput').value='';selSat(i);};
document.addEventListener('click',function(e){if(!document.getElementById('srchpanel').contains(e.target))window.hideSrch();});

// Render
var SIDEREAL=TAU/86164,fc=0,fpsT=performance.now();
function render(now){
  requestAnimationFrame(render);
  var dt=(now-lastT)/1000;lastT=now;
  simTime+=dt*speed*1000;earthRot+=SIDEREAL*dt*speed;
  if(autoRot)camTh+=.0015*dt*60;
  var W=canvas.clientWidth*devicePixelRatio|0,H=canvas.clientHeight*devicePixelRatio|0;
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  tick+=dt*speed;if(tick>1.5){updSats();tick=0;}
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,.012,.032,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);gl.depthFunc(gl.LEQUAL);
  var mm=getMats(),mvp=mm.mvp,eMdl=rotY(earthRot),eMVP=mul(mvp,eMdl);
  gl.depthMask(false);gl.useProgram(starP);uniM(starP,'mvp',mvp);attr(starP,'p',stV,3);gl.drawArrays(gl.POINTS,0,stN);gl.depthMask(true);
  gl.useProgram(earthP);uniM(earthP,'mvp',eMVP);uniM(earthP,'mdl',eMdl);uni3(earthP,'sun',10,5,8);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,earthTex);uni1i(earthP,'tex',0);uni1i(earthP,'hasTex',hasTex);
  attr(earthP,'p',eV,3);attr(earthP,'nm',eN,3);attr(earthP,'uv',eU,2);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,eI);gl.drawElements(gl.TRIANGLES,sph.i.length,gl.UNSIGNED_SHORT,0);
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);gl.depthMask(false);gl.enable(gl.CULL_FACE);gl.cullFace(gl.FRONT);
  gl.useProgram(atmP);uniM(atmP,'mvp',mvp);uni3(atmP,'cam',mm.cx,mm.cy,mm.cz);attr(atmP,'p',eV,3);attr(atmP,'nm',eN,3);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,eI);gl.drawElements(gl.TRIANGLES,sph.i.length,gl.UNSIGNED_SHORT,0);
  gl.disable(gl.CULL_FACE);gl.depthMask(true);
  if(trlB&&trlN>1){gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);gl.useProgram(trailP);uniM(trailP,'mvp',mvp);attr(trailP,'p',trlB,3);gl.drawArrays(gl.LINE_STRIP,0,trlN);}
  if(N>0){gl.blendFunc(gl.SRC_ALPHA,gl.ONE);gl.useProgram(satP);uniM(satP,'mvp',mvp);uni1f(satP,'sz',canvas.height*.38);attr(satP,'p',sPB,3);attr(satP,'tp',sTB,1);attr(satP,'sl',sSB,1);gl.drawArrays(gl.POINTS,0,N);}
  gl.disable(gl.BLEND);
  fc++;if(now-fpsT>=1000){document.getElementById('fps').textContent=(fc*1000/(now-fpsT)|0)+' FPS / '+N.toLocaleString()+' OBJ';fc=0;fpsT=now;}
  document.getElementById('simclock').textContent=new Date(simTime).toISOString().replace('T',' ').slice(0,19)+' UTC';
}

// Boot
function setP(p,m){document.getElementById('lfill').style.width=p+'%';if(m)document.getElementById('lmsg').textContent=m;}
setP(20,'PARSING TLE DATA...');
setTimeout(function(){
  var objs=parseTLEs(TLE_DATA);
  objects=objs.slice(0,MAX);N=objects.length;
  sSl.fill(0);
  var counts={payload:0,rocket_body:0,debris:0,unknown:0};
  objects.forEach(function(o){counts[o.t]=(counts[o.t]||0)+1;});
  document.getElementById('stot').textContent=N.toLocaleString();
  document.getElementById('spay').textContent=(counts.payload||0).toLocaleString();
  document.getElementById('srkt').textContent=(counts.rocket_body||0).toLocaleString();
  document.getElementById('sdeb').textContent=(counts.debris||0).toLocaleString();
  document.getElementById('lp').textContent=counts.payload||0;
  document.getElementById('lr').textContent=counts.rocket_body||0;
  document.getElementById('ld').textContent=counts.debris||0;
  document.getElementById('lu').textContent=counts.unknown||0;
  document.getElementById('satcount').textContent=N.toLocaleString()+' OBJ';
  setP(60,'COMPUTING POSITIONS...');
  updSats();
  setP(90,'LAUNCHING...');
  requestAnimationFrame(render);
  setTimeout(function(){
    setP(100,'READY');
    setTimeout(function(){var l=document.getElementById('loader');l.classList.add('out');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},700);},300);
  },200);
},50);

})();
</script>
